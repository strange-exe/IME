<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  
  <g filter="url(#glow)">
    <!-- Envelope Base -->
    <path d="M112 160h288c26.5 0 48 21.5 48 48v192c0 26.5-21.5 48-48 48H112c-26.5 0-48-21.5-48-48V208c0-26.5 21.5-48 48-48z" fill="none" stroke="#ffffff" stroke-width="36" stroke-linejoin="round" />
    <!-- Flap forming an AI nodes connection -->
    <path d="M72 208l184 128 184-128" fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Center Node -->
    <circle cx="256" cy="336" r="28" fill="#ffffff" />
    <!-- Connecting lines to data nodes (extracting data) -->
    <path d="M256 336v-60" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />
    <circle cx="256" cy="240" r="20" fill="#ffffff" />
  </g>
</svg>
